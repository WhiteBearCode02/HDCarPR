services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecodrive
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  ai:
    build: ./ai_service
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/ecodrive
      JWT_SECRET: change-this-secret
      AI_SERVICE_URL: http://ai:8000
      HYUNDAI_CLIENT_ID: demo-client-id
      HYUNDAI_REDIRECT_URI: http://localhost:3000/callback
    depends_on:
      - db
      - ai
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
